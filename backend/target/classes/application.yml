spring:
  application:
    name: concert-booking

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/concert_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway quản lý schema, JPA chỉ validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:redis_pass}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

# JWT config
app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJWTShouldBeAtLeast256BitsLongForHS256Algorithm}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}    # 24 hours
  booking:
    expiration-minutes: 15     # Booking hết hạn sau 15 phút nếu chưa thanh toán
  redis:
    inventory-key-prefix: "inventory:ticket:"
    idempotency-key-prefix: "idem:booking:"
    idempotency-ttl-hours: 24

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

server:
  port: 8080

logging:
  level:
    com.geekup.concertbooking: DEBUG
    org.springframework.security: INFO